<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCW Lunacy — Match Reports</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#ddd; font-family:Arial,Helvetica,sans-serif; padding:24px; }
h1 { color:#d4af37; text-transform:uppercase; letter-spacing:3px; font-size:22px; margin-bottom:4px; }
.sub { color:#777; font-size:12px; margin-bottom:20px; }
.cards { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:22px; }
.card { background:linear-gradient(180deg,#1c1c20,#101013); border:2px solid #3a3a40; border-radius:8px; padding:12px 18px; min-width:150px; }
.card .num { font-size:26px; font-weight:900; color:#8dff1e; }
.card .lbl { font-size:10px; color:#999; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.card.gold .num { color:#ffe000; }
.card.pink .num { color:#ff2ea6; }
.row { display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
table { border-collapse:collapse; width:100%; font-size:12px; }
th { text-align:left; color:#d4af37; text-transform:uppercase; font-size:10px; letter-spacing:1px; padding:7px 10px; border-bottom:2px solid #3a3a40; position:sticky; top:0; background:#0a0a0a; }
td { padding:6px 10px; border-bottom:1px solid #1e1e22; white-space:nowrap; }
tr:hover td { background:#16161a; }
.win { color:#8dff1e; font-weight:900; }
.method { color:#ff8c1a; font-size:10px; text-transform:uppercase; font-weight:900; }
.mode-online { color:#66aaff; font-weight:900; }
.mode-cpu { color:#888; }
.pid { color:#666; font-family:monospace; font-size:10px; }
.tablewrap { flex:1 1 640px; max-height:70vh; overflow-y:auto; border:2px solid #2a2a30; border-radius:8px; }
.side { flex:0 0 280px; }
.side h2 { color:#d4af37; font-size:12px; text-transform:uppercase; letter-spacing:2px; margin:14px 0 8px; }
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:11px; }
.bar-row .name { width:110px; text-align:right; color:#bbb; text-transform:uppercase; font-size:10px; }
.bar { height:12px; background:linear-gradient(90deg,#ff4444,#ff9900); border-radius:2px; min-width:2px; }
.bar.g { background:linear-gradient(90deg,#8dff1e,#4e9000); }
.bar-row .n { color:#888; font-size:10px; }
button { background:linear-gradient(135deg,#d4af37,#aa8c2c); border:none; color:#000; font-weight:900; text-transform:uppercase; padding:9px 20px; border-radius:4px; cursor:pointer; letter-spacing:1px; margin-bottom:18px; }
button:active { transform:scale(0.97); }
#status { color:#777; font-size:11px; margin-left:12px; }
.empty { padding:40px; text-align:center; color:#666; }
</style>
</head>
<body>
<h1>JCW Lunacy — Match Reports</h1>
<div class="sub">Every finished match reports here automatically (CPU + online). Newest first.</div>
<button onclick="load()">&#8635; Refresh</button><span id="status"></span>
<div class="cards" id="cards"></div>
<div class="row">
    <div class="tablewrap"><table id="tbl"></table></div>
    <div class="side">
        <h2>Most Wins</h2><div id="wins"></div>
        <h2>Most Played</h2><div id="played"></div>
        <h2>Finish Methods</h2><div id="methods"></div>
    </div>
</div>
<script>
'use strict';
const DB = 'https://jcw-lunacy-default-rtdb.firebaseio.com';

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(t) {
    const d = new Date(t);
    return d.toLocaleDateString([], { month:'short', day:'numeric' }) + ' ' +
           d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
}
function fmtDur(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }
function bars(el, counts, cls) {
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8);
    const max = top.length ? top[0][1] : 1;
    el.innerHTML = top.map(([k, v]) =>
        '<div class="bar-row"><div class="name">' + esc(k) + '</div>' +
        '<div class="bar ' + cls + '" style="width:' + Math.round(v / max * 120) + 'px"></div>' +
        '<div class="n">' + v + '</div></div>').join('') || '<div class="empty" style="padding:8px;">no data</div>';
}

async function load() {
    const status = document.getElementById('status');
    status.textContent = 'loading…';
    let data;
    try {
        const r = await fetch(DB + '/reports.json');
        data = await r.json();
    } catch (e) { status.textContent = 'failed to load: ' + e.message; return; }
    const rows = Object.values(data || {}).filter(r => r && r.t).sort((a, b) => b.t - a.t);
    status.textContent = rows.length + ' matches · updated ' + new Date().toLocaleTimeString();

    // summary cards
    const now = Date.now(), day = 86400000;
    const today = rows.filter(r => now - r.t < day).length;
    const online = rows.filter(r => r.mode === 'online').length;
    const players = new Set(rows.map(r => r.pid).filter(Boolean)).size;
    document.getElementById('cards').innerHTML =
        '<div class="card"><div class="num">' + rows.length + '</div><div class="lbl">Total Matches</div></div>' +
        '<div class="card gold"><div class="num">' + today + '</div><div class="lbl">Last 24h</div></div>' +
        '<div class="card pink"><div class="num">' + online + '</div><div class="lbl">Online Matches</div></div>' +
        '<div class="card"><div class="num">' + players + '</div><div class="lbl">Unique Devices</div></div>';

    // side stats
    const wins = {}, played = {}, methods = {};
    rows.forEach(r => {
        if (r.winner) wins[r.winner] = (wins[r.winner] || 0) + 1;
        [r.p1, r.p2].forEach(w => { if (w) played[w] = (played[w] || 0) + 1; });
        if (r.method) methods[r.method] = (methods[r.method] || 0) + 1;
    });
    bars(document.getElementById('wins'), wins, 'g');
    bars(document.getElementById('played'), played, '');
    bars(document.getElementById('methods'), methods, 'g');

    // table (latest 300)
    const tbl = document.getElementById('tbl');
    if (!rows.length) { tbl.innerHTML = '<tr><td class="empty">No matches reported yet — play one!</td></tr>'; return; }
    tbl.innerHTML = '<tr><th>When</th><th>Match</th><th>Winner</th><th>Method</th><th>Time</th><th>Stage</th><th>Mode</th><th>Device</th></tr>' +
        rows.slice(0, 300).map(r =>
            '<tr><td>' + fmtDate(r.t) + '</td>' +
            '<td>' + esc(r.p1 || '?') + ' vs ' + esc(r.p2 || '?') + '</td>' +
            '<td class="win">' + esc(r.winner || '?') + '</td>' +
            '<td class="method">' + esc(r.method || '?') + '</td>' +
            '<td>' + fmtDur(r.secs || 0) + '</td>' +
            '<td>' + esc(r.stage || '?') + '</td>' +
            '<td class="mode-' + (r.mode === 'online' ? 'online' : 'cpu') + '">' + esc(r.mode || '?') + '</td>' +
            '<td class="pid">' + esc(r.pid || '') + '</td></tr>').join('');
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
